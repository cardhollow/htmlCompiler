<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML Playground</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:sans-serif;
}

.toolbar{
    display:flex;
    gap:10px;
    padding:10px;
}

button{
    flex:1;
    height:45px;
    font-size:16px;
    cursor:pointer;
}

#editor{
    width:100%;
    height:calc(100vh - 65px);
}
</style>
</head>
<body>

<div class="toolbar">
    <button id="run">▶ Run</button>
    <button id="debug">🐞 Debug</button>
</div>

<div id="editor"></div>

<script src="ace.js"></script>
<script src="theme-monokai.js"></script>
<script src="mode-html.js"></script>
<script src="worker-html.js"></script>

<script src="ext-language_tools.js"></script>
<script src="ext-searchbox.js"></script>
<script src="ext-beautify.js"></script>
<script src="ext-statusbar.js"></script>

<script src="snippets/html.js"></script>

<script>

// Tell Ace where the files are
ace.config.set("basePath", ".");
ace.config.setModuleUrl("ace/mode/html_worker","worker-html.js");
ace.config.setModuleUrl("ace/snippets/html","snippets/html.js");

const editor = ace.edit("editor");

editor.setTheme("ace/theme/monokai");
editor.session.setMode("ace/mode/html");

editor.setOptions({
    fontSize:15,
    wrap:true,
    useWorker:true,
    enableBasicAutocompletion:true,
    enableLiveAutocompletion:true,
    enableSnippets:true
});

editor.setValue(`<!DOCTYPE html>
<html>
<head>
<title>Test</title>
</head>
<body>

<h1>Hello!</h1>

<script>
console.log("Hello!");
<\/script>

</body>
</html>`,-1);

function run(debug=false){

    let code=editor.getValue();

    if(debug){

        const eruda=`
<script src="https://cdn.jsdelivr.net/npm/eruda"><\/script>
<script>
eruda.init();
<\/script>
`;

        if(code.match(/<\/body>/i))
            code=code.replace(/<\/body>/i,eruda+"</body>");
        else
            code+=eruda;
    }

    sessionStorage.setItem("playground_code",code);

    window.open("runner.html","_blank");
}

document.getElementById("run").onclick=()=>run(false);
document.getElementById("debug").onclick=()=>run(true);

// Ctrl+Shift+F to beautify
editor.commands.addCommand({
    name:"beautify",
    bindKey:{
        win:"Ctrl-Shift-F",
        mac:"Command-Shift-F"
    },
    exec:function(editor){
        ace.require("ace/ext/beautify").beautify(editor.session);
    }
});

</script>

</body>
</html>
