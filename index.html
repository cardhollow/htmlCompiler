<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HTML Playground</title>
<style>
html, body{
    margin:0;
    height:100%;
    font-family:sans-serif;
}

.toolbar{
    display:flex;
    gap:10px;
    padding:10px;
}

button{
    flex:1;
    height:45px;
    font-size:16px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:calc(100% - 65px);
    box-sizing:border-box;
    resize:none;
    font-family:monospace;
    font-size:14px;
    padding:10px;
}
</style>
</head>
<body>

<div class="toolbar">
    <button id="run">▶ Run</button>
    <button id="debug">🐞 Debug</button>
</div>

<textarea id="code"><!DOCTYPE html>
<html>
<head>
<title>Test</title>
</head>
<body>

<h1>Hello!</h1>

<script>
console.log("Hello!");
</script>

</body>
</html></textarea>

<script>
function run(debug=false){

    let code=document.getElementById("code").value;

    if(debug){

        const eruda=`
<script src="https://cdn.jsdelivr.net/npm/eruda"><\/script>
<script>
eruda.init();
<\/script>
`;

        if(code.match(/<\/body>/i))
            code=code.replace(/<\/body>/i,eruda+"</body>");
        else
            code+=eruda;
    }

    sessionStorage.setItem("playground_code",code);

    window.open("runner.html","_blank");
}

run.onclick=()=>{};
document.getElementById("run").onclick=()=>run(false);
document.getElementById("debug").onclick=()=>run(true);
</script>

</body>
</html>
